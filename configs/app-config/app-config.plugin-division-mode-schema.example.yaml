# Example: PostgreSQL with pluginDivisionMode schema (single database, one schema per plugin).
# Copy the backend.database block into configs/app-config/app-config.local.yaml after enabling
# the db service in compose.yaml — see docs/rhdh-local-guide/plugin-division-mode-schema.md
#
# Ensure default.env (or .env) defines POSTGRES_HOST, POSTGRES_PORT, POSTGRES_USER,
# POSTGRES_PASSWORD, POSTGRES_DB (see default.env).

backend:
  database:
    client: pg
    pluginDivisionMode: schema
    ensureSchemaExists: true
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      database: ${POSTGRES_DB}
